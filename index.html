<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sashimi">
<meta name="theme-color" content="#131d15">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="ati" href="">
<title>Sashimi</title>
<style>
  :root{
    --bg:#131d15;
    --panel:#1b2b1d;
    --panel-2:#223325;
    --line:#2d4432;
    --ink:#e3e8d2;
    --ink-dim:#8aaa8e;
    --ink-faint:#587060;
    --green:#c5d98a;
    --green-soft:#243022;
    --up:#7dbe65;
    --down:#d07060;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:16px;line-height:1.45;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:calc(16px + env(safe-area-inset-top)) 18px 12px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  }
  header h1{font-size:15px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin:0;color:var(--ink)}
  .meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint);letter-spacing:.05em}
  main{padding:14px 14px 24px;max-width:680px;margin:0 auto}

  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    background:rgba(19,29,21,.94);backdrop-filter:saturate(140%) blur(10px);
    border-top:1px solid var(--line);
    display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom));
  }
  nav button{
    flex:1;background:none;border:0;color:var(--ink-faint);
    font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;padding:10px 4px 8px;cursor:pointer;
    border-radius:8px;transition:color .15s;
  }
  nav button .ico{display:block;font-size:18px;margin-bottom:3px;line-height:1}
  nav button.active{color:var(--green)}

  .view{display:none}
  .view.active{display:block}

  .seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .seg button{
    background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);
    font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.04em;
    padding:12px 8px;border-radius:10px;cursor:pointer;transition:.15s;
  }
  .seg button.active{border-color:var(--green);color:var(--green);background:var(--green-soft)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
  .ex-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:6px}
  .ex-name{font-size:15px;font-weight:600;letter-spacing:.01em}
  .ex-scheme{font-family:var(--mono);font-size:11px;color:var(--ink-faint);white-space:nowrap}
  .ex-last{font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin-bottom:10px;line-height:1.5}
  .ex-last b{color:var(--green);font-weight:600}

  /* set rows */
  .set-row{display:grid;grid-template-columns:18px 1fr 1fr;gap:8px;align-items:end;margin-bottom:8px}
  .set-row:last-child{margin-bottom:0}
  .set-lbl{font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:.06em;padding-bottom:13px;text-align:center}
  .field label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px;font-weight:600}
  .field input,.field-input{
    width:100%;background:var(--panel-2);border:1px solid var(--line);
    border-radius:8px;color:var(--ink);font-family:var(--mono);font-size:18px;
    padding:10px 12px;text-align:center;-moz-appearance:textfield;
  }
  .field input::-webkit-outer-spin-button,.field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .field input:focus,.field-input:focus{outline:none;border-color:var(--green)}
  .field-input{font-family:var(--sans);font-size:14px;text-align:left}
  .set-deltas{font-family:var(--mono);font-size:10px;margin-top:6px;min-height:13px;letter-spacing:.02em;display:flex;gap:10px;flex-wrap:wrap}
  .set-deltas .up{color:var(--up)} .set-deltas .down{color:var(--down)} .set-deltas .flat{color:var(--ink-faint)}

  /* edit mode */
  .edit-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .edit-name-input{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:var(--sans);font-size:14px;font-weight:600;padding:9px 12px}
  .edit-name-input:focus{outline:none;border-color:var(--green)}
  .edit-scheme-input{width:86px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--ink-dim);font-family:var(--mono);font-size:12px;padding:9px 8px;text-align:center}
  .edit-scheme-input:focus{outline:none;border-color:var(--green)}
  .remove-ex{background:none;border:1px solid var(--line);color:var(--ink-faint);border-radius:8px;font-size:15px;cursor:pointer;padding:7px 10px;flex-shrink:0;line-height:1}
  .remove-ex:active{border-color:var(--down);color:var(--down)}
  .edit-defaults{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .edit-bar{display:flex;gap:8px;margin-bottom:12px}
  .edit-bar .btn{margin-top:0;font-size:13px;padding:11px}

  .btn{
    width:100%;background:var(--green);color:#131d15;border:0;border-radius:11px;
    font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:.03em;
    padding:15px;cursor:pointer;margin-top:6px;
  }
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--ink-dim);font-weight:600}
  .btn.danger{background:none;border:1px solid var(--down);color:var(--down);font-weight:600}

  .datebar{
    display:flex;align-items:center;gap:8px;margin-bottom:14px;
    font-family:var(--mono);font-size:12px;color:var(--ink-dim);
  }
  .datebar input{
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:12px;border-radius:8px;padding:7px 9px;
  }

  .picker{
    width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    font-family:var(--sans);font-size:14px;border-radius:10px;padding:12px;margin-bottom:14px;
  }
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .stat{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 8px;text-align:center}
  .stat .k{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  .stat .v{font-family:var(--mono);font-size:18px;color:var(--ink);margin-top:3px}
  .stat .v small{font-size:11px;color:var(--ink-dim)}

  svg.spark{width:100%;height:90px;display:block;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;margin-bottom:12px}

  .hist{list-style:none;margin:0;padding:0}
  .hist li{padding:11px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;background:var(--panel)}
  .hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .hist .when{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .hist .d{font-family:var(--mono);font-size:11px}
  .hist .d.up{color:var(--up)} .hist .d.down{color:var(--down)} .hist .d.flat{color:var(--ink-faint)}
  .hist .sets-summary{font-family:var(--mono);font-size:13px;color:var(--ink);display:flex;gap:10px;flex-wrap:wrap}
  .hist .sets-summary span b{color:var(--green);font-weight:600}
  .hist .tod{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em}
  .hist .load{font-family:var(--mono);font-size:15px;color:var(--ink)}
  .hist .load b{color:var(--green);font-weight:600}
  .del{background:none;border:0;color:var(--ink-faint);font-size:16px;cursor:pointer;padding:4px 6px}

  .empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:30px 10px;line-height:1.6}

  .toast{
    position:fixed;left:50%;bottom:calc(84px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--ink);color:#131d15;font-size:13px;font-weight:600;
    padding:10px 18px;border-radius:20px;opacity:0;transition:opacity .2s;z-index:40;pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1}

  .outfit-chips{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
  .outfit-chip{
    background:var(--panel-2);border:2px solid var(--line);color:var(--ink-faint);
    font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.03em;
    padding:10px 4px;border-radius:9px;cursor:pointer;transition:.15s;text-align:center;
  }
  .outfit-chip.selected{color:#131d15}
  .outfit-pip{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:4px;vertical-align:middle}

  .mg-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .mg-chip{background:none;border:1px solid;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.03em;padding:7px 13px;border-radius:20px;cursor:pointer;transition:.12s;white-space:nowrap}
  .mg-chip.no-data{opacity:.35;cursor:default}
  .mg-edit-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
  .mg-edit-chip{background:none;border:1px solid;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.03em;padding:5px 10px;border-radius:14px;cursor:pointer;transition:.12s;white-space:nowrap}
  .lift-card{cursor:pointer;transition:.1s}
  .lift-card:active{transform:translateY(1px)}

  .tools{display:flex;gap:8px;margin-top:18px}
  .tools .btn{margin-top:0}
  h2.sec{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin:22px 4px 10px}

  #gill-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  header,main{position:relative;z-index:1}
  .train-quote{font-family:var(--mono);font-size:11px;color:var(--ink-faint);text-align:center;letter-spacing:.05em;opacity:.5;padding:28px 20px 4px;line-height:1.7}

  .feel-chips{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
  .feel-chip{background:none;border:1px solid;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.01em;padding:9px 2px;border-radius:20px;cursor:pointer;transition:.12s;text-align:center;white-space:nowrap}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes chipBoom{0%{opacity:0;transform:scale(.65)}70%{transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}
  @keyframes feelPop{0%{opacity:0;transform:scale(.55)}65%{transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}

  #login-overlay{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
  #login-overlay.hidden{display:none}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 22px;width:100%;max-width:320px}
  .login-card h2{margin:0 0 6px;font-size:17px;font-weight:700;letter-spacing:.02em;color:var(--ink)}
  .login-card p{margin:0 0 22px;font-size:13px;color:var(--ink-dim);line-height:1.55}
  .login-field{margin-bottom:14px}
  .login-field label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px;font-weight:600}
  .login-field input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-family:var(--sans);font-size:16px;padding:13px 14px}
  .login-field input:focus{outline:none;border-color:var(--green)}
  .login-err{color:var(--down);font-size:12px;margin:0 0 12px;min-height:16px}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);display:inline-block;flex-shrink:0;transition:background .3s}
  .sync-dot.ok{background:var(--up)}
  .sync-dot.busy{background:var(--green);animation:syncpulse .9s ease-in-out infinite}
  .sync-dot.err{background:var(--down)}
  @keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<header>
  <h1>Sashimi</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="sync-dot" id="sync-dot" title="Not synced"></span>
    <span class="meta" id="clock"></span>
  </div>
</header>

<main>
  <!-- TRAIN -->
  <section class="view active" id="view-train">
    <div class="datebar">
      <span>Session</span>
      <input type="datetime-local" id="train-date">
    </div>
    <div class="seg" id="day-seg"></div>
    <div class="edit-bar">
      <button class="btn ghost" id="edit-toggle" style="font-size:13px;padding:11px;margin-top:0;display:flex;align-items:center;justify-content:center;gap:7px">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5L11.5 4.5L4.5 11.5H1.5V8.5L8.5 1.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M7 3L10 6" stroke="currentColor" stroke-width="1.4"/></svg>
        Edit exercises
      </button>
    </div>
    <div id="train-list"></div>
    <div class="feel-chips" id="feel-chips">
      <button class="feel-chip" data-feel="1">Midget Dawg</button>
      <button class="feel-chip" data-feel="2">Mid Dawg</button>
      <button class="feel-chip" data-feel="3">Good Dawg</button>
      <button class="feel-chip" data-feel="4">Large Dawg</button>
      <button class="feel-chip" data-feel="5">Big Dawg</button>
    </div>
    <button class="btn" id="save-session">Log session</button>
    <p class="train-quote" id="train-quote"></p>
  </section>

  <!-- PROGRESS -->
  <section class="view" id="view-progress">
    <div id="progress-body"></div>
  </section>

  <!-- BODY -->
  <section class="view" id="view-body">
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="field">
          <label>Weight (kg)</label>
          <input type="number" inputmode="decimal" id="bw-kg" placeholder="—">
        </div>
        <div class="field">
          <label>Time of day</label>
          <select class="picker" id="bw-tod" style="margin:0;padding:11px;font-family:var(--mono);font-size:15px;text-align:center">
            <option>Morning</option><option>Midday</option><option>Evening</option><option>Night</option>
          </select>
        </div>
      </div>
      <div class="outfit-chips" id="phase-chips">
        <button class="outfit-chip" data-phase="Period">Period</button>
        <button class="outfit-chip" data-phase="Follicular">Follicular</button>
        <button class="outfit-chip" data-phase="Ovulation">Ovulation</button>
        <button class="outfit-chip" data-phase="Luteal">Luteal</button>
      </div>
      <div class="datebar" style="margin:12px 0 0">
        <span>When</span><input type="datetime-local" id="bw-date">
      </div>
      <button class="btn" id="save-bw" style="margin-top:14px">Log weight</button>
    </div>
    <div class="stat-row" id="bw-stats"></div>
    <svg class="spark" id="bw-spark" viewBox="0 0 300 90" preserveAspectRatio="none"></svg>
    <h2 class="sec">History</h2>
    <ul class="hist" id="bw-hist"></ul>
  </section>

  <div class="tools" style="margin-top:0">
    <button class="btn ghost" id="logout-btn" style="color:var(--ink-faint);font-size:13px">Sign out</button>
  </div>
</main>

<div id="login-overlay" class="hidden">
  <div class="login-card">
    <h2>Sashimi</h2>
    <p>Hey baby — enter your name and password to login to your secure database.</p>
    <div class="login-field"><label>Name</label><input type="text" id="login-name" autocomplete="username" placeholder="Sash"></div>
    <div class="login-field"><label>Password</label><input type="password" id="login-pw" autocomplete="current-password"></div>
    <div class="login-err" id="login-err"></div>
    <button class="btn" id="login-btn">Sign in</button>
  </div>
</div>

<nav>
  <button class="active" data-view="train"><span class="ico">▦</span>Train</button>
  <button data-view="progress"><span class="ico">↗</span>Strength</button>
  <button data-view="body"><span class="ico">◷</span>Progress</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ── supabase config — fill these in from your project dashboard ── */
const SB_URL='https://qfwbawmwenvafxgjrzkk.supabase.co';
const SB_ANON='sb_publishable_k7UH8IXFRdVRGrMb-CpEAw_crybAyNl';
const SB_BUCKET='sashimilog';
const SB_ACCOUNT='sashimi@sashimilog.app'; // one Supabase user account — Sash never sees this
const SASH_NAME='Sash';
const SASH_PASS='Sashimi';

/* ── storage ── */
const K_LOGS="sash_logs_v1", K_BW="sash_bw_v1", K_SEED="sash_seeded_v1", K_ROUTINE="sash_routine_v1", K_FEEL="sash_feel_v1";
const load=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let logs=load(K_LOGS,[]);
let bw=load(K_BW,[]);
let feel=load(K_FEEL,{});
const K_SESSION='sash_session_v1';
const K_LAST_SAVED='sash_lastSaved_v1';
let session=load(K_SESSION,null);

const PHASES={Period:"#c94b4b",Follicular:"#e07fa0",Ovulation:"#e3b13c",Luteal:"#9b7fd4"};
const phaseColor=p=>PHASES[p]||"#646a72";
const FEEL_COLORS=["#c94b4b","#d07060","#d4a843","#7dbe65","#c5d98a"];

/* ── muscle groups ── */
const MUSCLE_GROUPS={Quads:"#5b9fd6",Hamstrings:"#9b7fd4",Glutes:"#e07fa0",Calves:"#e8956d",Core:"#c47fb5",Chest:"#e07060",Back:"#4db8a4",Shoulders:"#d4a843"};
let activeGroup=null,activeLift=null;

/* ── default routine ── */
// Format: [name, scheme, defaultKg, defaultReps, muscleGroup]
const DEFAULT_ROUTINE={
  "Lower A":[
    ["Leg Press","2×6–10","","","Quads"],
    ["Leg Extension","2×8–13","","","Quads"],
    ["Seated Hamstring Curl","2×8–13","","","Hamstrings"],
    ["Hip Thrust Machine","2×6–10","","","Glutes"],
    ["Abductor Machine","2×10–13","","","Glutes"],
    ["Calf Raise","3×10–13","","","Calves"],
    ["Ab Machine","2×10–13","","","Core"],
  ],
  "Upper A":[
    ["Chest Press Machine","2×6–10","","","Chest"],
    ["Lat Pulldown","2×6–10","","","Back"],
    ["Seated Row Machine","2×8–10","","","Back"],
    ["Shoulder Press Machine","2×8–10","","","Shoulders"],
  ],
  "Lower B":[
    ["Hack Squat","2×6–10","","","Quads"],
    ["Lying or Seated Hamstring Curl","2×8–13","","","Hamstrings"],
    ["Leg Extension","2×8–13","","","Quads"],
    ["Cable Kickback or Glute Drive Machine","2×8–13","","","Glutes"],
    ["Abductor Machine","2×10–13","","","Glutes"],
    ["Calf Raise","3×10–13","","","Calves"],
    ["Ab Machine","2×10–13","","","Core"],
  ],
  "Upper B":[
    ["Pec Deck","2×8–10","","","Chest"],
    ["Close-Grip / Assisted Pulldown","2×6–10","","","Back"],
    ["Chest-Supported Row Machine","2×8–10","","","Back"],
    ["Lateral Raise","2×10–13","","","Shoulders"],
  ],
};

let ROUTINE=load(K_ROUTINE,null)||JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
let _routineTimer;
function saveRoutine(){save(K_ROUTINE,ROUTINE);clearTimeout(_routineTimer);_routineTimer=setTimeout(pushCloud,3000);}

const exId=(w,name)=>w+"::"+name;

/* ── helpers ── */
const $=s=>document.querySelector(s);
const e1rm=(kg,reps)=>kg>0&&reps>0?kg*(1+reps/30):0;
const fmt=n=>Number.isFinite(n)?(Math.round(n*10)/10).toString():"–";
const parseSets=sch=>Math.max(1,parseInt(sch)||1);

function nowLocalISO(d=new Date()){
  const p=x=>String(x).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function todFromDate(d){const h=d.getHours();return h<11?"Morning":h<15?"Midday":h<20?"Evening":"Night";}
function shortDate(ts){
  const d=new Date(ts);
  return d.toLocaleDateString(undefined,{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),1800);}

function lastSessionSets(id){
  const all=logs.filter(l=>l.exId===id);
  if(!all.length)return null;
  const lastTs=Math.max(...all.map(e=>e.ts));
  return all.filter(e=>e.ts===lastTs).sort((a,b)=>(a.set||1)-(b.set||1));
}
function sessionGroups(id){
  const map={};
  logs.filter(l=>l.exId===id).forEach(e=>{(map[e.ts]=map[e.ts]||[]).push(e);});
  return Object.entries(map).sort(([a],[b])=>+a-+b).map(([,sets])=>sets.sort((a,b)=>(a.set||1)-(b.set||1)));
}
function bestSet(group){return group.reduce((b,e)=>e1rm(e.kg,e.reps)>e1rm(b.kg,b.reps)?e:b);}

function renameDay(oldName,newName){
  const entries=Object.entries(ROUTINE);
  const idx=entries.findIndex(([k])=>k===oldName);
  if(idx===-1)return;
  entries[idx]=[newName,entries[idx][1]];
  ROUTINE=Object.fromEntries(entries);
  if(day===oldName)day=newName;
  saveRoutine();
}

function renderTrain(){
  const list=$("#train-list");list.innerHTML="";
  if(editMode){renderEditList(list);return;}

  ROUTINE[day].forEach(([name,sch])=>{
    const id=exId(day,name);
    const ns=parseSets(sch);
    const prev=lastSessionSets(id);
    let lastLine="";
    if(prev){
      const setStr=prev.map(e=>`<b>${fmt(e.kg)}</b>×${e.reps}`).join(" · ");
      lastLine=`last  ${setStr}  <span style="color:var(--ink-faint)">${shortDate(prev[0].ts)}</span>`;
    }
    const card=document.createElement("div");
    card.className="card";card.dataset.ex=id;card.dataset.name=name;card.dataset.sets=ns;
    let rowsHtml="";
    for(let s=1;s<=ns;s++){
      const p=prev?(prev.find(e=>(e.set||1)===s)||prev[prev.length-1]):null;
      rowsHtml+=`
        <div class="set-row" data-sn="${s}">
          <div class="set-lbl">S${s}</div>
          <div class="field">
            ${s===1?'<label>kg</label>':''}
            <input type="number" inputmode="decimal" class="in-kg" value="${p?fmt(p.kg):""}">
          </div>
          <div class="field">
            ${s===1?'<label>reps</label>':''}
            <input type="number" inputmode="numeric" class="in-reps" value="${p?p.reps:""}">
          </div>
        </div>`;
    }
    card.innerHTML=`
      <div class="ex-head"><span class="ex-name">${name}</span><span class="ex-scheme">${sch}</span></div>
      ${lastLine?`<div class="ex-last">${lastLine}</div>`:''}
      ${rowsHtml}
      <div class="set-deltas"></div>`;
    const deltaDiv=card.querySelector(".set-deltas");
    card.querySelectorAll(".set-row").forEach(row=>{
      const sn=+row.dataset.sn;
      const p=prev?(prev.find(e=>(e.set||1)===sn)||prev[prev.length-1]):null;
      const kgI=row.querySelector(".in-kg"),repI=row.querySelector(".in-reps");
      const upd=()=>{
        const kg=parseFloat(kgI.value),reps=parseInt(repI.value);
        deltaDiv.querySelectorAll(`[data-dsn="${sn}"]`).forEach(s=>s.remove());
        if(!p||!(kg>0)||!(reps>0))return;
        const de=e1rm(kg,reps)-e1rm(p.kg,p.reps);
        const cls=de>0.05?"up":de<-0.05?"down":"flat";
        const sign=x=>x>0?"+"+fmt(x):fmt(x);
        const sp=document.createElement("span");
        sp.className=cls;sp.dataset.dsn=sn;sp.textContent=`S${sn} ${sign(de)}`;
        deltaDiv.appendChild(sp);
      };
      kgI.oninput=upd;repI.oninput=upd;
    });
    list.appendChild(card);
  });
}

function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function groupData(groupName){
  const ids=new Set();
  for(const w in ROUTINE)ROUTINE[w].forEach(ex=>{if((ex[4]||"")===groupName)ids.add(exId(w,ex[0]));});
  const byDay={};
  logs.filter(l=>ids.has(l.exId)).forEach(l=>{
    const dk=new Date(l.ts).toDateString();
    if(!byDay[dk])byDay[dk]={ts:l.ts,sets:[]};
    byDay[dk].sets.push(l);byDay[dk].ts=Math.min(byDay[dk].ts,l.ts);
  });
  return Object.values(byDay).sort((a,b)=>a.ts-b.ts)
    .map(d=>({ts:d.ts,best:d.sets.reduce((b,e)=>e1rm(e.kg,e.reps)>e1rm(b.kg,b.reps)?e:b)}));
}
function groupSparkline(svg,data,col){
  svg.innerHTML="";if(data.length<2)return;
  const W=300,H=90,pad=8;
  const vals=data.map(d=>e1rm(d.best.kg,d.best.reps));
  const min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const x=i=>pad+i*(W-2*pad)/(data.length-1);
  const y=v=>H-pad-(v-min)/rng*(H-2*pad);
  const d=vals.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  const area=d+` L ${x(vals.length-1).toFixed(1)} ${H-pad} L ${x(0).toFixed(1)} ${H-pad} Z`;
  svg.insertAdjacentHTML("beforeend",
    `<path d="${area}" fill="${hexToRgba(col,.1)}"/>`+
    `<path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`+
    `<circle cx="${x(vals.length-1).toFixed(1)}" cy="${y(vals[vals.length-1]).toFixed(1)}" r="3" fill="${col}"/>`);
  animateSparkline(svg);
}
function miniSparkline(svg,vals,col){
  if(vals.length<2)return;
  const W=120,H=40,pad=4;
  const min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const x=i=>pad+i*(W-2*pad)/(vals.length-1);
  const y=v=>H-pad-(v-min)/rng*(H-2*pad);
  const d=vals.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  svg.insertAdjacentHTML("beforeend",
    `<path d="${d}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity=".85"/>`+
    `<circle cx="${x(vals.length-1).toFixed(1)}" cy="${y(vals[vals.length-1]).toFixed(1)}" r="2.5" fill="${col}"/>`);
}

function animateSparkline(svg){
  const path=svg.querySelectorAll('path')[1];if(!path)return;
  const len=path.getTotalLength();
  path.style.strokeDasharray=len;path.style.strokeDashoffset=len;
  path.style.transition='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    path.style.transition='stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)';
    path.style.strokeDashoffset='0';
  }));
}
function bwSparkline(svg,entries){
  svg.innerHTML="";if(entries.length<2)return;
  const W=300,H=90,pad=8;
  const vals=entries.map(e=>e.kg);
  const min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const x=i=>pad+i*(W-2*pad)/(entries.length-1);
  const y=v=>H-pad-(v-min)/rng*(H-2*pad);
  const d=vals.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  svg.insertAdjacentHTML("beforeend",
    `<path d="${d}" fill="none" stroke="rgba(100,106,114,.35)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`);
  entries.forEach((en,i)=>{
    const col=phaseColor(en.phase);
    svg.insertAdjacentHTML("beforeend",
      `<circle cx="${x(i).toFixed(1)}" cy="${y(en.kg).toFixed(1)}" r="${i===entries.length-1?4:3}" fill="${col}" stroke="var(--panel)" stroke-width="1.5"/>`);
  });
}

function renderProgress(){
  const body=$("#progress-body");
  const anyAssigned=Object.values(ROUTINE).some(d=>d.some(ex=>ex[4]));
  if(!anyAssigned){
    body.innerHTML=`<p class="empty">Go to Edit mode and tap a muscle group on each exercise — progress will chart here automatically.</p>`;
    return;
  }
  const dataGroups=new Set();
  for(const w in ROUTINE)ROUTINE[w].forEach(ex=>{const mg=ex[4]||"";if(mg&&logs.some(l=>l.exId===exId(w,ex[0])))dataGroups.add(mg);});
  const assignedGroups=new Set();
  for(const w in ROUTINE)ROUTINE[w].forEach(ex=>{if(ex[4])assignedGroups.add(ex[4]);});
  if(activeGroup&&!dataGroups.has(activeGroup))activeGroup=null;
  const chipsHtml=Object.keys(MUSCLE_GROUPS).filter(g=>assignedGroups.has(g)).map(g=>{
    const col=MUSCLE_GROUPS[g],hasData=dataGroups.has(g),isActive=activeGroup===g;
    return `<button class="mg-chip${hasData?"":" no-data"}" data-group="${g}" data-has="${hasData?1:0}"
      style="border-color:${col};color:${isActive?"#131d15":col};${isActive?`background:${col}`:""}">${g}</button>`;
  }).join("");
  body.innerHTML=`<div class="mg-chips">${chipsHtml}</div><div id="group-body"></div>`;
  body.querySelectorAll(".mg-chip").forEach(chip=>{
    chip.onclick=()=>{
      if(!parseInt(chip.dataset.has)){toast("Log "+chip.dataset.group+" exercises first");return;}
      activeGroup=chip.dataset.group;activeLift=null;renderProgress();
    };
  });
  if(!progressChipsAnimated){
    body.querySelectorAll('.mg-chip').forEach((chip,i)=>{
      chip.style.animation=`chipBoom .38s cubic-bezier(.34,1.56,.64,1) ${i*55}ms both`;
    });
    progressChipsAnimated=true;
  }
  if(!activeGroup){
    $("#group-body").innerHTML=`<p class="empty" style="margin-top:4px">Select a muscle group above.</p>`;return;
  }
  activeLift?renderLiftView(activeLift):renderGroupView(activeGroup);
}
function renderGroupView(groupName){
  const col=MUSCLE_GROUPS[groupName],gb=$("#group-body");
  const data=groupData(groupName);
  if(!data.length){gb.innerHTML=`<p class="empty">Hey qt. Once you log some sessions it'll populate the data here.</p>`;return;}
  const last=data[data.length-1].best;
  const firstE=e1rm(data[0].best.kg,data[0].best.reps),lastE=e1rm(last.kg,last.reps);
  const gainPct=firstE>0?((lastE-firstE)/firstE*100):0;
  gb.innerHTML=`
    <div class="stat-row" style="grid-template-columns:1fr">
      <div class="stat"><div class="k">Gained</div><div class="v" style="color:${gainPct>0.5?"var(--up)":gainPct<-0.5?"var(--down)":"var(--ink)"}">${gainPct>0?"+":""}${fmt(gainPct)}<small>%</small></div></div>
    </div>
    <svg class="spark" id="group-spark" viewBox="0 0 300 90" preserveAspectRatio="none"></svg>
    <h2 class="sec">Individual lifts</h2>
    <div id="lift-list"></div>`;
  groupSparkline($("#group-spark"),data,col);
  const liftList=$("#lift-list");
  const exercises=[];
  for(const w in ROUTINE)ROUTINE[w].forEach(ex=>{if((ex[4]||"")===groupName)exercises.push({id:exId(w,ex[0]),name:ex[0]});});
  let _ci=0;
  exercises.forEach(({id,name})=>{
    const sessions=sessionGroups(id);if(!sessions.length)return;
    const lb=bestSet(sessions[sessions.length-1]);
    const vals=sessions.map(g=>e1rm(bestSet(g).kg,bestSet(g).reps));
    const card=document.createElement("div");card.className="card lift-card";
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
        <div style="min-width:0">
          <div class="ex-name" style="margin-bottom:3px">${name}</div>
          <div class="ex-last">last <b>${fmt(lb.kg)}</b>×${lb.reps} · ${sessions.length} session${sessions.length>1?"s":""}</div>
        </div>
        <svg viewBox="0 0 120 40" preserveAspectRatio="none" style="width:80px;height:34px;flex-shrink:0;background:var(--panel-2);border:1px solid var(--line);border-radius:6px"></svg>
      </div>`;
    miniSparkline(card.querySelector("svg"),vals,col);
    card.style.animation=`fadeUp .32s ease ${_ci*60}ms both`;
    card.onclick=()=>{activeLift=id;renderProgress();};
    liftList.appendChild(card);
    _ci++;
  });
  if(!liftList.children.length)liftList.innerHTML=`<p class="empty">Log some ${groupName} sessions to see individual lift data.</p>`;
}
function renderLiftView(id){
  const gb=$("#group-body"),col=MUSCLE_GROUPS[activeGroup]||"#c5d98a";
  const sessions=sessionGroups(id);
  if(!sessions.length){gb.innerHTML=`<p class="empty">No data for this exercise yet.</p>`;return;}
  const exName=id.split("::")[1];
  const lastBest=bestSet(sessions[sessions.length-1]);
  const firstE=e1rm(bestSet(sessions[0]).kg,bestSet(sessions[0]).reps),lastE=e1rm(lastBest.kg,lastBest.reps);
  const gainPct=firstE>0?((lastE-firstE)/firstE*100):0;
  gb.innerHTML=`
    <button id="back-btn" class="btn ghost" style="margin-bottom:12px;font-size:13px;padding:10px;display:flex;align-items:center;gap:6px">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M7 1L3 5L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      ${activeGroup}
    </button>
    <div class="ex-name" style="font-size:16px;margin-bottom:10px">${exName}</div>
    <div class="stat-row" style="grid-template-columns:1fr">
      <div class="stat"><div class="k">Gained</div><div class="v" style="color:${gainPct>0.5?"var(--up)":gainPct<-0.5?"var(--down)":"var(--ink)"}">${gainPct>0?"+":""}${fmt(gainPct)}<small>%</small></div></div>
    </div>
    <svg class="spark" id="ex-spark" viewBox="0 0 300 90" preserveAspectRatio="none"></svg>
    <h2 class="sec">History — newest first</h2>
    <ul class="hist" id="ex-hist"></ul>`;
  groupSparkline($("#ex-spark"),sessions.map(g=>({ts:g[0].ts,best:bestSet(g)})),col);
  $("#back-btn").onclick=()=>{activeLift=null;renderProgress();};
  const ul=$("#ex-hist");
  [...sessions].reverse().forEach((group,i,arr)=>{
    const prevGroup=arr[i+1];
    const best=bestSet(group),prevBest=prevGroup?bestSet(prevGroup):null;
    const de=prevBest?e1rm(best.kg,best.reps)-e1rm(prevBest.kg,prevBest.reps):null;
    const cls=de==null?"flat":de>0.05?"up":de<-0.05?"down":"flat";
    const dTxt=de==null?"—":(de>0?"+":"")+fmt(de);
    const setsHtml=group.map(e=>`<span><b>${fmt(e.kg)}</b>×${e.reps}</span>`).join("");
    const li=document.createElement("li");
    li.innerHTML=`
      <div class="hist-head">
        <span class="when">${shortDate(group[0].ts)}</span>
        <div style="display:flex;align-items:center;gap:6px"><span class="d ${cls}">${dTxt}</span><button class="del">✕</button></div>
      </div>
      <div class="sets-summary">${setsHtml}</div>`;
    li.querySelector(".del").onclick=()=>{
      const ts=group[0].ts;logs=logs.filter(l=>!(l.exId===id&&l.ts===ts));
      save(K_LOGS,logs);renderProgress();toast("Session deleted");pushCloud();
    };
    ul.appendChild(li);
  });
}

/* ── BODY ── */
$("#save-bw").onclick=()=>{
  const kg=parseFloat($("#bw-kg").value);
  if(!(kg>0)){toast("Enter a weight");return;}
  const dt=$("#bw-date").value;
  const ts=dt?new Date(dt).getTime():Date.now();
  const sel=document.querySelector(".outfit-chip.selected");
  const phase=sel?sel.dataset.phase:"";
  bw.push({id:ts+Math.random(),ts,kg,tod:$("#bw-tod").value,phase});
  save(K_BW,bw);pushCloud();$("#bw-kg").value="";
  document.querySelectorAll(".outfit-chip").forEach(c=>{
    c.classList.remove("selected");c.style.background="";c.style.borderColor="";c.style.color="";
  });
  renderBody();toast("Weight logged");
};

function renderBody(){
  const stats=$("#bw-stats"),ul=$("#bw-hist");
  const s=[...bw].sort((a,b)=>a.ts-b.ts);
  if(s.length===0){
    stats.innerHTML="";$("#bw-spark").innerHTML="";
    ul.innerHTML=`<p class="empty">Weight is just a heuristic for progress, not something to fixate over. Do or don't boo.</p>`;return;
  }
  const last=s[s.length-1];
  const last7=s.filter(x=>x.ts>=Date.now()-7*864e5);
  const avg7=last7.length?last7.reduce((a,x)=>a+x.kg,0)/last7.length:last.kg;
  const trend=s.length>1?last.kg-s[0].kg:0;
  stats.innerHTML=`
    <div class="stat"><div class="k">Latest</div><div class="v">${fmt(last.kg)}<small>kg</small></div></div>
    <div class="stat"><div class="k">7-day avg</div><div class="v">${fmt(avg7)}<small>kg</small></div></div>
    <div class="stat"><div class="k">Net</div><div class="v" style="color:${trend>0.05?'var(--up)':trend<-0.05?'var(--down)':'var(--ink)'}">${trend>0?"+":""}${fmt(trend)}</div></div>`;
  bwSparkline($("#bw-spark"),s);
  ul.innerHTML="";
  [...s].reverse().forEach((en,i,arr)=>{
    const prev=arr[i+1];const dk=prev?en.kg-prev.kg:null;
    const cls=dk==null?"flat":dk>0.05?"up":dk<-0.05?"down":"flat";
    const dTxt=dk==null?"—":(dk>0?"+":"")+fmt(dk);
    const pip=en.phase?`<span class="outfit-pip" style="background:${phaseColor(en.phase)}"></span>${en.phase}`:"";
    const li=document.createElement("li");
    li.innerHTML=`
      <div class="hist-head">
        <div>
          <div class="load"><b>${fmt(en.kg)}</b> kg</div>
          <div class="when">${shortDate(en.ts)} · <span class="tod">${en.tod}</span>${pip?` · <span style="color:var(--ink-dim);display:inline-flex;align-items:center">${pip}</span>`:""}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px"><span class="d ${cls}">${dTxt}</span><button class="del">✕</button></div>
      </div>`;
    li.querySelector(".del").onclick=()=>{bw=bw.filter(b=>b.id!==en.id);save(K_BW,bw);renderBody();toast("Entry deleted");pushCloud();};
    ul.appendChild(li);
  });
}

/* ── gill background texture ── */
(function(){
  const vw=window.innerWidth,vh=window.innerHeight,DEG=Math.PI/180,S=vw/155;
  function gillPaths(cx,cy,rMax,a0d,a1d,n,bow){
    const a0=a0d*DEG,a1=a1d*DEG;let s='';
    for(let i=0;i<=n;i++){
      const t=i/n,a=a0+t*(a1-a0),cA=Math.cos(a),sA=Math.sin(a);
      const ex=(cx+rMax*cA).toFixed(1),ey=(cy+rMax*sA).toFixed(1);
      const px=(cx+rMax*.52*cA+rMax*bow*sA).toFixed(1),py=(cy+rMax*.52*sA-rMax*bow*cA).toFixed(1);
      s+=`<path d="M${cx.toFixed(1)} ${cy.toFixed(1)} Q${px} ${py} ${ex} ${ey}" stroke-width=".65"/>`;
      if(i<n){
        const a2=a0+(i+.5)/n*(a1-a0),c2=Math.cos(a2),s2=Math.sin(a2),r2=rMax*.44,ln=rMax-r2;
        const sx=(cx+r2*c2).toFixed(1),sy=(cy+r2*s2).toFixed(1),ex2=(cx+rMax*c2).toFixed(1),ey2=(cy+rMax*s2).toFixed(1);
        const p2x=(cx+r2*c2+ln*.52*c2+ln*bow*s2).toFixed(1),p2y=(cy+r2*s2+ln*.52*s2-ln*bow*c2).toFixed(1);
        s+=`<path d="M${sx} ${sy} Q${p2x} ${p2y} ${ex2} ${ey2}" stroke-width=".42"/>`;
        [.25,.75].forEach(off=>{
          const aq=a0+(i+off)/n*(a1-a0),rq=rMax*.7;
          s+=`<line x1="${(cx+rq*Math.cos(aq)).toFixed(1)}" y1="${(cy+rq*Math.sin(aq)).toFixed(1)}" x2="${(cx+rMax*Math.cos(aq)).toFixed(1)}" y2="${(cy+rMax*Math.sin(aq)).toFixed(1)}" stroke-width=".24"/>`;
        });
      }
    }
    return s;
  }
  const ns='http://www.w3.org/2000/svg',svg=document.createElementNS(ns,'svg');
  svg.id='gill-bg';svg.setAttribute('viewBox',`0 0 ${vw} ${vh}`);
  [
    [76*S,-6*S,194*S,28,152,48,.07,.055],
    [-5*S,18*S,176*S,16, 98,38,.07,.065],
    [157*S,12*S,170*S,82,164,36,.07,.065],
    [14*S,48*S,138*S,30,112,28,.065,.05],
  ].forEach(([cx,cy,r,a0,a1,n,bow,op])=>{
    const gg=document.createElementNS(ns,'g');
    gg.setAttribute('opacity',op);gg.setAttribute('stroke','#c5d98a');
    gg.setAttribute('fill','none');gg.setAttribute('stroke-linecap','round');
    gg.innerHTML=gillPaths(cx,cy,r,a0,a1,n,bow);
    svg.appendChild(gg);
  });
  document.body.insertBefore(svg,document.body.firstChild);
})();

/* ── supabase auth + cloud sync ── */
function saveSession(s){session=s;save(K_SESSION,s);}
function clearSession(){session=null;localStorage.removeItem(K_SESSION);}

function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  if(!dot)return;
  dot.className='sync-dot'+(state?' '+state:'');
  dot.title=state==='ok'?'Synced':state==='busy'?'Syncing…':state==='err'?'Sync error':'Not synced';
}

async function getToken(){
  if(!session)return null;
  if(session.expires_at>Date.now()+60000)return session.access_token;
  try{
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST',
      headers:{'apikey':SB_ANON,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:session.refresh_token})
    });
    if(!r.ok)throw new Error();
    const d=await r.json();
    saveSession({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:Date.now()+d.expires_in*1000,user_id:session.user_id});
    return d.access_token;
  }catch{clearSession();showLogin();return null;}
}

async function sbFetch(path,opts={}){
  const tok=await getToken();if(!tok)return null;
  return fetch(SB_URL+path,{...opts,headers:{'apikey':SB_ANON,'Authorization':'Bearer '+tok,...(opts.headers||{})}});
}

async function pushCloud(){
  if(!session)return;
  setSyncStatus('busy');
  try{
    const lastSaved=Date.now();
    save(K_LAST_SAVED,lastSaved);
    const r=await sbFetch(`/storage/v1/object/${SB_BUCKET}/${session.user_id}/data.json`,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-upsert':'true'},
      body:JSON.stringify({logs,bw,routine:ROUTINE,feel,lastSaved})
    });
    setSyncStatus(r&&r.ok?'ok':'err');
  }catch{setSyncStatus('err');}
}

async function pullCloud(){
  if(!session)return;
  // device already has data — push it, don't pull (prevents cloud clobbering local)
  if(logs.length>0){pushCloud();return;}
  // genuinely empty device (new phone) — restore from cloud
  setSyncStatus('busy');
  try{
    const r=await sbFetch(`/storage/v1/object/authenticated/${SB_BUCKET}/${session.user_id}/data.json`);
    if(!r||r.status===404){setSyncStatus('ok');return;}
    if(!r.ok){setSyncStatus('err');return;}
    const d=await r.json();
    if(d.logs)logs=d.logs;
    if(d.bw)bw=d.bw;
    if(d.feel)feel=d.feel;
    // routine is never restored from cloud — DEFAULT_ROUTINE is always the baseline
    save(K_LOGS,logs);save(K_BW,bw);save(K_FEEL,feel);
    setSyncStatus('ok');
  }catch{setSyncStatus('err');}
}

async function signIn(name,pw){
  if(name!==SASH_NAME||pw!==SASH_PASS)throw new Error('Wrong name or password');
  const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SB_ANON,'Content-Type':'application/json'},
    body:JSON.stringify({email:SB_ACCOUNT,password:pw})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error_description||e.message||e.msg||JSON.stringify(e));}
  const d=await r.json();
  saveSession({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:Date.now()+d.expires_in*1000,user_id:d.user.id});
}

function showLogin(){document.getElementById('login-overlay').classList.remove('hidden');}
function hideLogin(){document.getElementById('login-overlay').classList.add('hidden');}

document.getElementById('login-btn').onclick=async()=>{
  const name=document.getElementById('login-name').value.trim();
  const pw=document.getElementById('login-pw').value;
  const errEl=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  if(!name||!pw){errEl.textContent='Enter your name and password';return;}
  btn.textContent='Signing in…';btn.disabled=true;errEl.textContent='';
  try{
    await signIn(name,pw);
    await pullCloud();
    hideLogin();
    day=Object.keys(ROUTINE)[0];activeGroup=null;activeLift=null;
    renderDaySeg();renderTrain();initFeelChips();popFeelChips();
    const activeTab=document.querySelector('nav button.active');
    if(activeTab&&activeTab.dataset.view==='progress')renderProgress();
    if(activeTab&&activeTab.dataset.view==='body')renderBody();
  }catch(e){errEl.textContent=e.message||'Sign in failed';}
  btn.textContent='Sign in';btn.disabled=false;
};

document.getElementById('logout-btn').onclick=()=>{
  clearSession();setSyncStatus('');showLogin();
};
